<!doctype html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  {{JSONLD_SCRIPTS}}
  <style>
    :root {
      --page-bg: #f5f7fb;
      --surface: #ffffff;
      --surface-alt: #f8fbff;
      --line: #d6deec;
      --text: #152033;
      --muted: #5a6780;
      --accent: #0f4c81;
      --accent-strong: #0b3b63;
      --accent-soft: #e6f1ff;
      --warn-bg: #fff5dc;
      --warn-line: #f0c766;
      --warn-text: #6e4b00;
      --json-bg: #f3f6fb;
      --page-max-width: 1120px;
      --page-padding-top: 24px;
      --page-padding-bottom: 96px;
      --section-gap: 18px;
      --section-padding: 22px;
      --section-radius: 24px;
      --section-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --hero-padding-y: 28px;
      --hero-title-size: clamp(2rem, 4vw, 3.5rem);
      --hero-gradient-end: #eef5ff;
      --alt-section-surface: #f8fbff;
      --cta-block-padding: 14px 16px;
      --cta-target-padding: 11px 16px;
      --sticky-cta-shadow: 0 18px 38px rgba(15, 76, 129, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--page-bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      text-align: start;
    }

    body {
      line-height: 1.7;
    }

    body.tier-lite {
      --page-max-width: 960px;
      --section-gap: 14px;
      --section-padding: 18px;
      --section-radius: 20px;
      --section-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      --hero-padding-y: 20px;
      --hero-title-size: clamp(1.8rem, 3.8vw, 2.8rem);
      --hero-gradient-end: #f6f9fd;
      --alt-section-surface: #fafcff;
      --cta-block-padding: 12px 14px;
      --cta-target-padding: 10px 14px;
      --sticky-cta-shadow: 0 10px 20px rgba(15, 76, 129, 0.12);
    }

    body.tier-default {
      --page-max-width: 1120px;
      --section-gap: 18px;
      --section-padding: 22px;
      --section-radius: 24px;
      --section-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --hero-padding-y: 28px;
      --hero-title-size: clamp(2rem, 4vw, 3.5rem);
      --hero-gradient-end: #eef5ff;
      --alt-section-surface: #f8fbff;
      --cta-block-padding: 14px 16px;
      --cta-target-padding: 11px 16px;
      --sticky-cta-shadow: 0 18px 38px rgba(15, 76, 129, 0.2);
    }

    body.tier-premium {
      --page-max-width: 1180px;
      --section-gap: 22px;
      --section-padding: 26px;
      --section-radius: 28px;
      --section-shadow: 0 24px 52px rgba(15, 23, 42, 0.12);
      --hero-padding-y: 36px;
      --hero-title-size: clamp(2.4rem, 4.8vw, 4rem);
      --hero-gradient-end: #e6f0ff;
      --alt-section-surface: #f3f8ff;
      --cta-block-padding: 18px 20px;
      --cta-target-padding: 13px 18px;
      --sticky-cta-shadow: 0 22px 42px rgba(15, 76, 129, 0.24);
    }

    a {
      color: inherit;
    }

    .page-shell {
      min-height: 100vh;
      padding: var(--page-padding-top) 16px var(--page-padding-bottom);
    }

    .landing-main {
      width: min(100%, var(--page-max-width));
      margin: 0 auto;
      display: grid;
      gap: var(--section-gap);
    }

    .landing-section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--section-radius);
      box-shadow: var(--section-shadow);
      overflow: hidden;
    }

    .landing-section__inner {
      padding: var(--section-padding);
    }

    .landing-section__heading {
      margin: 0 0 14px;
      line-height: 1.25;
      color: #101827;
      letter-spacing: -0.01em;
    }

    .landing-section__content {
      display: grid;
      gap: 12px;
    }

    .landing-section--hero {
      background: linear-gradient(180deg, #ffffff 0%, var(--hero-gradient-end) 100%);
      border-color: #c8d8ef;
    }

    .landing-section--hero .landing-section__inner {
      padding-top: var(--hero-padding-y);
      padding-bottom: var(--hero-padding-y);
    }

    .landing-section--hero .landing-section__heading {
      font-size: var(--hero-title-size);
    }

    .landing-section--trust-strip,
    .landing-section--hours,
    .landing-section--footer-contact {
      background: var(--alt-section-surface);
    }

    .landing-section--whatsapp-cta {
      border-color: #c5d9f1;
    }

    .slot-text,
    .slot-unresolved,
    .slot-json,
    .slot-list,
    .cta-block {
      margin: 0;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--surface-alt);
      padding: 14px 16px;
    }

    .slot-text,
    .slot-unresolved {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .slot-list {
      padding-inline-start: 34px;
      display: grid;
      gap: 8px;
    }

    .slot-json {
      background: var(--json-bg);
      overflow-x: auto;
      direction: ltr;
      text-align: left;
      unicode-bidi: isolate;
      font-family: "DejaVu Sans Mono", "Liberation Mono", Consolas, monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    .slot-unresolved {
      border-color: var(--warn-line);
      background: var(--warn-bg);
      color: var(--warn-text);
      font-family: "DejaVu Sans Mono", "Liberation Mono", Consolas, monospace;
      font-size: 13px;
    }

    .cta-block {
      background: linear-gradient(180deg, #ffffff 0%, #eef5ff 100%);
      border-color: #c9d9ee;
      display: grid;
      gap: 10px;
      padding: var(--cta-block-padding);
    }

    .cta-block__action {
      color: var(--accent);
      font-weight: 700;
      word-break: break-word;
    }

    .cta-block__target {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: var(--cta-target-padding);
      border-radius: 14px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      direction: ltr;
      unicode-bidi: isolate;
      word-break: break-all;
    }

    .cta-block__target:hover,
    .cta-block__target:focus-visible {
      background: var(--accent-strong);
    }

    .cta-block__target--static {
      background: var(--accent-soft);
      color: var(--accent-strong);
      word-break: break-word;
      text-decoration: none;
    }

    .cta-block--sticky-mobile {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 50;
      box-shadow: var(--sticky-cta-shadow);
    }

    body.tier-lite .landing-section--hero {
      border-color: #d9e3ef;
    }

    body.tier-default .landing-section--hero {
      border-color: #c8d8ef;
    }

    body.tier-premium .landing-section--hero {
      border-color: #b9cdef;
      background: linear-gradient(180deg, #ffffff 0%, var(--hero-gradient-end) 100%);
    }

    body.tier-lite .landing-section--trust-strip,
    body.tier-lite .landing-section--hours,
    body.tier-lite .landing-section--footer-contact {
      border-color: #dce4ee;
    }

    body.tier-premium .landing-section--trust-strip,
    body.tier-premium .landing-section--hours,
    body.tier-premium .landing-section--footer-contact {
      border-color: #c8d8ee;
    }

    body.tier-lite .landing-section--whatsapp-cta .cta-block {
      border-color: #d4deeb;
    }

    body.tier-premium .landing-section--whatsapp-cta .cta-block {
      border-color: #bdd3ee;
    }

    #omega-render-notes {
      display: none;
    }

    @media (min-width: 769px) {
      body.tier-lite {
        --section-gap: 16px;
        --section-padding: 20px;
        --hero-padding-y: 24px;
      }

      body.tier-default {
        --page-padding-top: 36px;
        --page-padding-bottom: 48px;
        --section-gap: 22px;
        --section-padding: 28px;
        --hero-padding-y: 34px;
      }

      body.tier-premium {
        --page-padding-top: 36px;
        --page-padding-bottom: 48px;
        --section-gap: 28px;
        --section-padding: 34px;
        --hero-padding-y: 46px;
      }

      .cta-block--sticky-mobile {
        display: none;
      }
    }
  </style>
</head>
<body class="{{BODY_CLASS}}">
  <div class="page-shell">
    <main class="landing-main">
      {{SECTIONS_HTML}}
    </main>
    {{STICKY_MOBILE_CTA}}
  </div>
  <script type="application/json" id="omega-render-notes">{{RENDER_NOTES_JSON}}</script>
</body>
</html>
