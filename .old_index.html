        <p style="margin-top: 10px; font-weight: 700; color: #7e859b;">جاري تحويلك إلى نون السعودية...</p>

    <script>
        function copyAndRedirect() {
            const btn = document.getElementById('copyBtn');
            const code = document.getElementById('couponCode').innerText;
            const overlay = document.getElementById('overlay');

            // Modern Clipboard API
            if (navigator.clipboard) {
                navigator.clipboard.writeText(code).then(() => {
                    handleSuccess(btn, overlay);
                }).catch(err => {
                    // Fallback for older browsers
                    fallbackCopy(code, btn, overlay);
                });
            } else {
                fallbackCopy(code, btn, overlay);
            }
        }

        function fallbackCopy(text, btn, overlay) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; // Avoid scrolling to bottom
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                handleSuccess(btn, overlay);
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            document.body.removeChild(textArea);
        }

        function handleSuccess(btn, overlay) {
            btn.classList.add('success');
            btn.innerHTML = `
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                تم النسخ!
            `;

            // Show overlay after a brief moment
            setTimeout(() => {
                overlay.classList.add('active');
            }, 600);

            // Redirect after showing overlay to Noon KSA
            setTimeout(() => {
                window.location.href = 'https://www.noon.com/saudi-ar/';
            }, 2500);
        }
    </script>
